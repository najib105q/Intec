<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>Meine Strasse</title>
        <style>
            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
            }
            .scene {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            }
            .background {
                position: absolute;
                width: 100%;
                height: 100%;
                background-image: url(Aufgabe3_Bilder/background.svg);
                background-repeat: repeat-x;
                background-size: contain;
                background-position: bottom 20% center;
            }
            .car {
                position: absolute;
                width: 15vw;
                min-width: 120px;
            }
            @keyframes drive-left {
                0% { right: -15vw; }
                100% { right: 130%; }
            }

            @keyframes drive-right {
                0% { left: -15vw; }
                100% { left: 130%; }
            }
            .car1 { bottom: 12%; right: -30%; transform: scaleX(-1); animation: drive-left 10s linear infinite; }
            .car2 { bottom: -5%; animation: drive-right 10s linear infinite; }
            .car3 { bottom: 12%; right: -30%; transform: scaleX(-1); animation: drive-left 10s linear infinite 2s backwards;}
            .car4 { bottom: -5%; animation: drive-right 10s linear infinite 3s backwards; }
        </style>
    </head>

    <body>
        <div class="scene">
        <div class="background"> </div>
        
          <img src="Aufgabe3_Bilder/car1.svg" class ="car car1" alt="Car1">
          <img src="Aufgabe3_Bilder/car2.svg" class ="car car2" alt="Car2">
          <img src="Aufgabe3_Bilder/car3.svg" class ="car car3" alt="Car3">
          <img src="Aufgabe3_Bilder/car4.svg" class ="car car4" alt="Car4">  
        </div>
    </body>
</html>
