<!DOCTYPE html>
<html lang="de">
    <head>
    <meta charset="UTF-8">
    <title>Broetchenrechner</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        .centered {
            text-align: center;
            margin-top: 20vh;
        }

        input, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }

    </style>
    </head>
    <body>
        <script>

            function calculatePrice() {
                let amount = parseInt(document.getElementById("meinInput").value);
                if (isNaN(amount) || amount < 0) {
                    alert("Bitte eine gültige Anzahl angeben!");
                    return;
                }

                let price = amount * 0.55;

                if (amount > 10) {
                    price *= 0.9;
                }

                alert("Du kaufst " + amount + " Brötchen.\nGesamtpreis: " + price.toFixed(2) + " €"); 
            }
            
            document.write('<div class="centered">');
            document.write('<h2>Brötchenrechner</h2>');
            document.write('<input type="number" id="meinInput" placeholder="Anzahl der Brötchen">');
            document.write('<button onclick="calculatePrice()">Absenden</button>');
            document.write('</div>');

            
        </script>
    </body>
</html>
