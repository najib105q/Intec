<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>Tabellenmanipulation</title>
        <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 5vh;
        }

        input, button {
            margin: 10px;
            padding: 8px;
            font-size: 16px;
        }

        table {
            margin: 30px auto;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 15px;
            border: 1px solid #000;
        }

        td.color-cell {
            color: white;
        }

        </style>
    </head>
    <body>
        <h2>DOM-Tabellenmultiplikation</h2>
        <div>
            <button onclick="addRow()" >Zeile hinzufügen</button>
            <button onclick="addCol()" >Spalte hinzufügen</button>
            <button onclick="remRow()" >Zeile entfernen</button>
            <button onclick="remCol()" >Spalte entfernen</button>
        </div>
        
        <h3 id="dimensionText">Dimension: 0 X 0</h3>
        <table id="DOM-Tabellenmanipulation"></table>
        <script>
            const table = document.getElementById("DOM-Tabellenmanipulation");
            let numberOfRows = 0;
            let numberOfCols = 0;

            function updateDimensionText() {
                const text = document.getElementById("dimensionText");
                text.textContent = `Dimension ${numberOfRows} X ${numberOfCols}`;
            }
            
            function addRow() {
                const row = table.insertRow();
                for (let i = 0; i < numberOfCols; i++) {
                    row.insertCell();
                }
                numberOfRows++;
                updateDimensionText();
            }

            function addCol() {
                for (let i = 0; i < numberOfRows; i++) {
                    table.rows[i].insertCell();
                }
                numberOfCols++;
                updateDimensionText();
            }

            function remRow() {
                if (numberOfRows > 0) {
                    table.deleteRow(-1);
                    numberOfRows--;
                    updateDimensionText();
                }
            }

            function remCol() {
                if (numberOfCols > 0) {
                    for (let i = 0; i < numberOfRows; i++) {
                        table.rows[i].deleteCell(-1);
                    }
                    numberOfCols--;
                    updateDimensionText();
                }
            }
        </script>
    </body>
</html>
