<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Drei gewinnt</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
        }

        td {
            width: 75px;
            height: 75px;
            border: 1px solid black;
            font-size: 50px;
            text-align: center;
            vertical-align: middle;
        }

        td:first-child {
            border-left: 0;
        }

        td:last-child {
            border-right: 0;
        }

        tr:first-child td {
            border-top: 0;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        td:hover {
            background-color: #eeeeee;
            cursor: pointer;
        }

        #info {
            margin-top: 1em;
            font-size: 20px;
        }
    </style>
</head>

<body>

<h1>Drei gewinnt</h1>

<table id="board">
    <tr>
        <td></td><td></td><td></td>
    </tr>
    <tr>
        <td></td><td></td><td></td>
    </tr>
    <tr>
        <td></td><td></td><td></td>
    </tr>
</table>

<div id="info">X ist am Zug</div>

<script>
    let currentPlayer = "X";
    let gameActive = true;
    let gameStatus = ["", "", "", "", "", "", "", "", ""];

    const board = document.getElementById("board");
    const informationDisplay = document.getElementById("info");

    const winningCombinations = [
        [0, 1, 2],
        [3, 4, 5],
        [6, 7, 8],
        [0, 3, 6],
        [1, 4, 7],
        [2, 5, 8],
        [0, 4, 8],
        [2, 4, 6]
    ];

    function switchPlayer() {
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        informationDisplay.textContent = currentPlayer + " ist am Zug";
    }

    function cellClicked(event) {
        const clickedCell = event.target;
        const clickedIndex = parseInt(clickedCell.getAttribute("data-index"));

        if (!gameActive || gameStatus[clickedIndex] !== "") return;

        clickedCell.textContent = currentPlayer;
        gameStatus[clickedIndex] = currentPlayer;

        if (checkForWinner()) {
            informationDisplay.textContent = currentPlayer + " hat gewonnen!";
            gameActive = false;
            return;
        }

        if (isDraw()) {
            informationDisplay.textContent = "Unentschieden";
            gameActive = false;
            return;
        }

        switchPlayer();
    }

    function checkForWinner() {
        for (let combo of winningCombinations) {
            const [a, b, c] = combo;
            if (gameStatus[a] !== "" && gameStatus[a] === gameStatus[b] && gameStatus[b] === gameStatus[c]) {
                return true;
            }
        }
        return false;
    }

    function isDraw() {
        return !gameStatus.includes("");
    }

    let cellIndex = 0;
    for (let i = 0; i < board.rows.length; i++) {
        for (let j = 0; j < board.rows[i].cells.length; j++) {
            const cell = board.rows[i].cells[j];
            cell.setAttribute("data-index", cellIndex);
            cell.addEventListener("click", cellClicked);
            cellIndex++;
        }
    }

    informationDisplay.textContent = currentPlayer + " ist am Zug";
</script>

</body>
</html>
